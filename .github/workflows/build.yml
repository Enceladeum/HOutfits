name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud (release track)
        shell: pwsh
        run: |
          # Dalamud.NET.Sdk resolves the game references from
          # %AppData%\XIVLauncher\addon\Hooks\dev. CI runners have no XIVLauncher
          # install, so recreate that path from the public distrib. If a build ever
          # fails on an API-level mismatch, swap latest.zip -> stg/latest.zip below.
          $dev = "$env:AppData\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Force -Path $dev | Out-Null
          Invoke-WebRequest -Uri "https://goatcorp.github.io/dalamud-distrib/latest.zip" -OutFile "$env:RUNNER_TEMP\dalamud.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\dalamud.zip" -DestinationPath $dev -Force

      - name: Build
        run: dotnet build -c Release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HOutfits
          path: bin/Release/HOutfits/latest.zip
          if-no-files-found: error

      - name: Publish release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Release/HOutfits/latest.zip
          fail_on_unmatched_files: true
